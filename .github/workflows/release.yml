name: Release (Windows)

on:
  push:
    tags:
      - 'v*'

jobs:
  # Mac builds are done locally via: npm run release
  # This job handles Windows only.
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish Windows release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_CHECKOUT_PRO_MONTHLY: https://duskry.lemonsqueezy.com/checkout/buy/19796589-e460-4e38-8513-0b060194031d
          VITE_CHECKOUT_PRO_YEARLY: https://duskry.lemonsqueezy.com/checkout/buy/ef3fcef5-e5d2-4b78-8b50-71739ffdc0fd
          VITE_CHECKOUT_PROPLUS_MONTHLY: https://duskry.lemonsqueezy.com/checkout/buy/e4ce5c2b-7fab-4398-88c0-ad66bef7ed6a
          VITE_CHECKOUT_PROPLUS_YEARLY: https://duskry.lemonsqueezy.com/checkout/buy/113dc867-f131-4b35-812c-66bddd3aa278
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Duskry ${{ github.ref_name }}'
          releaseBody: |
            ## What's new

            See the assets below to download and install Duskry.

            **macOS**: Download the `.dmg` file for your chip
            > If macOS shows a security warning, go to **System Settings → Privacy & Security → Open Anyway**

            **Windows**: Download the `.msi` or `.exe` installer
          releaseDraft: false
          prerelease: false

      - name: Merge Mac + Windows updater manifests
        shell: bash
        run: |
          # tauri-action uploaded a Windows-only latest.json; merge Mac entries back in
          # Retry a few times in case the Mac script is still uploading
          for i in 1 2 3 4 5; do
            gh release download "${{ github.ref_name }}" --pattern "mac-latest.json" -O mac-latest.json --clobber 2>/dev/null && break
            echo "Waiting for mac-latest.json (attempt $i/5)..."
            sleep 30
          done

          if [ -f mac-latest.json ]; then
            gh release download "${{ github.ref_name }}" --pattern "latest.json" -O win-latest.json --clobber
            jq -s '{version: .[0].version, notes: .[0].notes, pub_date: .[0].pub_date, platforms: (.[0].platforms + .[1].platforms)}' mac-latest.json win-latest.json > latest.json
            gh release upload "${{ github.ref_name }}" latest.json --clobber
            echo "Merged Mac + Windows updater manifests into latest.json"
          else
            echo "mac-latest.json not found — latest.json will be Windows-only"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

